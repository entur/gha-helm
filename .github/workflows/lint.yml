name: Entur/Helm/Lint

on:
  workflow_call:
    inputs:
      environment:
        description: "The target environment"
        required: true
        type: string
      chart:
        description: "The chart, defaults to `helm/$repository_name`"
        type: string
        default: "default"
      values:
        description: "The values file in `./helm/$app/env/`, default `values-kub-ent-$environment.yaml`"
        type: string
        default: "default"
      timeout_minutes:
        description: "Job timeout in minutes"
        type: number
        default: 3

jobs:
  helm-lint:
    runs-on: ubuntu-24.04
    timeout-minutes: ${{ inputs.timeout_minutes }}
    name: Helm lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/helm-lint
        with:
          environment: ${{ inputs.environment }}
          chart: ${{ inputs.chart }}
          values: ${{ inputs.values }}
      - uses: entur/gha-meta/.github/actions/posthog@v1
        id: send-analytics
        name: Send analytics to PostHog
        if: always()
        with:
          api_key:         ${{ vars.POSTHOG_API_TOKEN_PLATTFORM }}
          gha_repository:  entur/gha-helm # This must be hardcoded to the repository where the workflow is defined.
          workflow_inputs: ${{ toJSON(inputs) }}
          workflow_name:   helm-lint
