---
name: Entur/Helm/Deploy

on:
  workflow_call:
    inputs:
      image:
        description: "The image to deploy, on the form app:tag. Use `na` value to skip replacing the image version in the helm config."
        required: true
        type: string
      cloud_provider:
        description: "Which cloud service provider to use - Google Cloud: 'gcp' or Azure: 'az'"
        type: string
        default: "gcp"
      environment:
        type: string
        description: "GitHub environment to use Google Cloud: (dev, tst, prd) or Azure: (az-dev, az-test, az-prod)"
        required: true
      chart:
        description: "The chart, defaults to `helm/$repository_name`"
        type: string
        default: "repo_name"
      values:
        description: "The values file in `./helm/$app/env/`, default `values-kub-ent-$environment.yaml`"
        type: string
        default: "values"
      release_name:
        description: "The release name, defaults to repository name"
        type: string
        default: "repo_name"
      namespace:
        description: "The namespace to use, defaults to repository name"
        type: string
        default: "repo_name"
      gcp_project_id:
        type: string
        description: "Do not use this input"
      gcp_cluster_name:
        type: string
        description: "Do not use this input"
      gcp_cluster_location:
        type: string
        description: "Defaults to europe-west1"
        default: "europe-west1"
      timeout_minutes:
        description: "Job timeout in minutes. Helm deploy timeout is half of this value to enable rollback. Default is 30 minutes."
        type: number
        default: 30
      image_set_path:
        description: "Comma-separated Helm values path(s) for the container image. Override when using aliased common chart dependencies (multi-app deploy), e.g. 'multi-1.container.image,multi-2.container.image' - or when using 3rd party charts."
        type: string
        default: "common.container.image"
      git_ref:
        description: "Git reference to check out before deployment. This can be used as an override if necessary"
        type: string
        required: false
      slack_channel_id:
        description: "Optional Slack channel ID (not name) to post deploy status notifications to. Requires 'secrets: inherit' on the caller workflow and run a '/invite @GitHub Actions' in the Slack channel."
        type: string
        required: false
    outputs:
      HELM_DEPLOY_STATUS:
        description: "Helm Deploy Status 0: Success, 1: Failed, 2: Rollback, 3: Rollback Failed"
        value: ${{ jobs.helm-deploy.outputs.HELM_DEPLOY_STATUS }}
jobs:
  slack-pending:
    if: inputs.slack_channel_id != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    outputs:
      message: ${{ steps.build-message.outputs.message }}
      blocks: ${{ steps.build-message.outputs.blocks }}
    steps:
      - id: check-approval
        name: check if environment has approval gate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          if ! RULES=$(gh api "repos/${REPOSITORY}/environments/${ENVIRONMENT}" --jq '[.protection_rules[]?.type] | join(",")' 2>&1); then
            echo "::warning::Could not fetch environment protection rules: ${RULES}, requires read access to the repository."
            echo "has_approval_gate=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$RULES" == *"required_reviewers"* ]]; then
            echo "has_approval_gate=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_approval_gate=false" >> "$GITHUB_OUTPUT"
          fi
      - id: build-message
        if: steps.check-approval.outputs.has_approval_gate == 'true'
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
          ENVIRONMENT: ${{ inputs.environment }}
          IMAGE: ${{ inputs.image }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MESSAGE=":lock: Approval Needed | ${REPOSITORY} → ${ENVIRONMENT}"
          echo "message=${MESSAGE}" >> "$GITHUB_OUTPUT"

          BLOCKS=$(jq -nc \
            --arg repo "$REPOSITORY" \
            --arg env "$ENVIRONMENT" \
            --arg image "$IMAGE" \
            --arg actor "$ACTOR" \
            --arg url "$RUN_URL" \
            '[
              {"type":"header","text":{"type":"plain_text","text":":lock: Approval Needed","emoji":true}},
              {"type":"section","fields":[
                {"type":"mrkdwn","text":"*Repository:* \($repo)"},
                {"type":"mrkdwn","text":"*Environment:* \($env)"},
                {"type":"mrkdwn","text":"*Triggered by:* \($actor)"}
              ]},
              {"type":"context","elements":[{"type":"mrkdwn","text":"Image: `\($image)`"}]},
              {"type":"section","text":{"type":"mrkdwn","text":"<\($url)|Approve Deployment>"}}
            ]'
          )
          echo "blocks<<GHA_SLACK_BLOCKS_EOF" >> "$GITHUB_OUTPUT"
          echo "$BLOCKS" >> "$GITHUB_OUTPUT"
          echo "GHA_SLACK_BLOCKS_EOF" >> "$GITHUB_OUTPUT"
  slack-pending-notify:
    if: needs.slack-pending.outputs.message != ''
    needs: [slack-pending]
    uses: entur/gha-slack/.github/workflows/post.yml@v3
    with:
      channel_id: ${{ inputs.slack_channel_id }}
      message: ${{ needs.slack-pending.outputs.message }}
      blocks: ${{ needs.slack-pending.outputs.blocks }}
    secrets: inherit
  helm-deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: ${{ inputs.timeout_minutes }}
    name: Helm deploy
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    env:
      GHA_HELM_DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
      GHA_HELM_DEPLOY_IMAGE: ${{ inputs.image }}
      GHA_HELM_DEPLOY_CLOUD_PROVIDER: ${{ inputs.cloud_provider }}
      GHA_HELM_DEPLOY_RELEASE_NAME: ${{ inputs.release_name }}
      GHA_HELM_DEPLOY_CHART: ${{ inputs.chart }}
      GHA_HELM_DEPLOY_VALUES: ${{ inputs.values }}
      GHA_HELM_DEPLOY_NAMESPACE: ${{ inputs.namespace }}
      GHA_HELM_DEPLOY_ENV: ${{inputs.environment }}
      GHA_HELM_DEPLOY_REGISTRY: eu.gcr.io/entur-system-1287
      GHA_HELM_DEPLOY_GCP_PROJECT_ID: ${{ inputs.gcp_project_id }}
      GHA_HELM_DEPLOY_GCP_CLUSTER_NAME: ${{ inputs.gcp_cluster_name }}
      GHA_HELM_DEPLOY_GCP_CLUSTER_LOCATION: ${{ inputs.gcp_cluster_location }}
      GHA_HELM_DEPLOY_IMAGE_SET_PATH: ${{ inputs.image_set_path }}
      GHA_GIT_REF: ${{ inputs.git_ref }}
      # ignore "context access might be invalid" warning
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ vars.SERVICE_ACCOUNT }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLUSTER_NAME: ${{ vars.AZURE_CLUSTER_NAME  }}
      AZURE_CLUSTER_RESOURCE_GROUP: ${{ vars.AZURE_CLUSTER_RESOURCE_GROUP }}
    outputs:
      HELM_DEPLOY_STATUS: ${{ steps.helm-deploy.outputs.HELM_DEPLOY_STATUS }}
    steps:
      - id: verify-cloud-provider
        if: env.GHA_HELM_DEPLOY_CLOUD_PROVIDER != 'gcp' && env.GHA_HELM_DEPLOY_CLOUD_PROVIDER != 'az'
        shell: bash
        run: |
          echo "Invalid cloud provider input: ${GHA_HELM_DEPLOY_CLOUD_PROVIDER}"
          echo "Valid options are: 'gcp' or 'az'"
          exit 1
      - id: verify-image
        if: env.GHA_HELM_DEPLOY_IMAGE == '' || env.GHA_HELM_DEPLOY_IMAGE == ':'
        shell: bash
        run: |
          echo "Invalid image input: ${GHA_HELM_DEPLOY_IMAGE}"
          exit 1
      - id: set-release-name
        if: env.GHA_HELM_DEPLOY_RELEASE_NAME == 'repo_name'
        shell: bash
        run: |
          echo "GHA_HELM_DEPLOY_RELEASE_NAME=${GITHUB_REPOSITORY#*/}" >> $GITHUB_ENV
      - id: set-chart-name
        if: env.GHA_HELM_DEPLOY_CHART == 'repo_name'
        shell: bash
        run: |
          echo "GHA_HELM_DEPLOY_CHART=helm/${GITHUB_REPOSITORY#*/}" >> $GITHUB_ENV
      - id: set-namespace
        if: env.GHA_HELM_DEPLOY_NAMESPACE == 'repo_name'
        shell: bash
        run: |
          echo "GHA_HELM_DEPLOY_NAMESPACE=${GITHUB_REPOSITORY#*/}" >> $GITHUB_ENV
      - id: set-values-file
        if: env.GHA_HELM_DEPLOY_VALUES == 'values'
        shell: bash
        run: |
          echo "GHA_HELM_DEPLOY_VALUES=values-kub-ent-${GHA_HELM_DEPLOY_ENV}.yaml" >> $GITHUB_ENV
      - id: set-registry-azure
        if: env.GHA_HELM_DEPLOY_CLOUD_PROVIDER == 'az'
        shell: bash
        run: |
          echo "GHA_HELM_DEPLOY_REGISTRY=acrentur001.azurecr.io" >> $GITHUB_ENV
      - id: verify-clustername-az
        name: Verify Cluster Name Azure
        shell: bash
        if: inputs.cloud_provider == 'az' && !env.AZURE_CLUSTER_NAME
        run: |
          echo "GitHub repository environment variable AZURE_CLUSTER_NAME is not set. Setup using tf-azure-apps. Exiting."
          exit 1
      - id: checkout-default-ref
        uses: actions/checkout@v6
        if: env.GHA_GIT_REF == ''
      - id: checkout-specific-ref
        uses: actions/checkout@v6
        if: env.GHA_GIT_REF != ''
        with:
          ref: ${{ env.GHA_GIT_REF }}
      - id: install
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "v3.19.2"
      - uses: entur/gha-meta/.github/actions/cloud-auth@v1
        with:
          environment: ${{ env.GHA_HELM_DEPLOY_ENVIRONMENT }}
          cloud_provider: ${{ env.GHA_HELM_DEPLOY_CLOUD_PROVIDER }}
          gcp_workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
          azure_client_id: ${{ env.AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ env.AZURE_TENANT_ID }}
          azure_subscription_id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - uses: entur/gha-meta/.github/actions/k8s-auth@v1
        with:
          environment: ${{ env.GHA_HELM_DEPLOY_ENVIRONMENT }}
          cloud_provider: ${{ env.GHA_HELM_DEPLOY_CLOUD_PROVIDER }}
          gcp_project_id: ${{ env.GHA_HELM_DEPLOY_GCP_PROJECT_ID }}
          gcp_cluster_name: ${{ env.GHA_HELM_DEPLOY_GCP_CLUSTER_NAME }}
          gcp_cluster_location: ${{ env.GHA_HELM_DEPLOY_GCP_CLUSTER_LOCATION }}
          azure_cluster_resource_group: ${{ env.AZURE_CLUSTER_RESOURCE_GROUP }}
          azure_cluster_name: ${{ env.AZURE_CLUSTER_NAME }}
          azure_token: ${{ secrets.GITHUB_TOKEN }}
      - id: helm-deploy
        name: Helm deploy ./${{ env.GHA_HELM_DEPLOY_CHART }}
        uses: entur/gha-helm/.github/actions/helm-deploy@v1
        with:
          timeout_minutes: ${{ inputs.timeout_minutes }}
          image: ${{ env.GHA_HELM_DEPLOY_IMAGE }}
          release_name: ${{ env.GHA_HELM_DEPLOY_RELEASE_NAME }}
          chart: ${{ env.GHA_HELM_DEPLOY_CHART }}
          values: ${{ env.GHA_HELM_DEPLOY_VALUES }}
          namespace: ${{ env.GHA_HELM_DEPLOY_NAMESPACE }}
          image_set_path: ${{ env.GHA_HELM_DEPLOY_IMAGE_SET_PATH }}
          registry: ${{ env.GHA_HELM_DEPLOY_REGISTRY }}
  prepare-slack:
    if: always() && inputs.slack_channel_id != ''
    needs: [helm-deploy]
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    outputs:
      message: ${{ steps.build-message.outputs.message }}
      blocks: ${{ steps.build-message.outputs.blocks }}
    steps:
      - id: build-message
        shell: bash
        env:
          DEPLOY_STATUS: ${{ needs.helm-deploy.outputs.HELM_DEPLOY_STATUS }}
          REPOSITORY: ${{ github.repository }}
          ENVIRONMENT: ${{ inputs.environment }}
          IMAGE: ${{ inputs.image }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          case "${DEPLOY_STATUS}" in
            0)
              EMOJI=":white_check_mark:"
              TITLE="Helm Deploy Successful"
              STATUS_TEXT="Deploy Successful"
              ;;
            1)
              EMOJI=":x:"
              TITLE="Helm Deploy Failed"
              STATUS_TEXT="Deploy Failed (no previous release to roll back to)"
              ;;
            2)
              EMOJI=":warning:"
              TITLE="Helm Deploy Failed — Rolled Back"
              STATUS_TEXT="Deploy Failed, Rollback Succeeded"
              ;;
            3)
              EMOJI=":rotating_light:"
              TITLE="CRITICAL — Helm Deploy & Rollback Failed"
              STATUS_TEXT="Deploy Failed, Rollback Also Failed"
              ;;
            *)
              EMOJI=":question:"
              TITLE="Helm Deploy Status Unknown"
              STATUS_TEXT="Unknown (status: ${DEPLOY_STATUS:-empty})"
              ;;
          esac

          MESSAGE="${EMOJI} ${TITLE} | ${REPOSITORY} → ${ENVIRONMENT}"
          echo "message=${MESSAGE}" >> "$GITHUB_OUTPUT"

          BLOCKS=$(jq -nc \
            --arg emoji "$EMOJI" \
            --arg title "$TITLE" \
            --arg repo "$REPOSITORY" \
            --arg env "$ENVIRONMENT" \
            --arg image "$IMAGE" \
            --arg status "$STATUS_TEXT" \
            --arg actor "$ACTOR" \
            --arg url "$RUN_URL" \
            '[
              {"type":"header","text":{"type":"plain_text","text":"\($emoji) \($title)","emoji":true}},
              {"type":"section","fields":[
                {"type":"mrkdwn","text":"*Repository:* \($repo)"},
                {"type":"mrkdwn","text":"*Environment:* \($env)"},
                {"type":"mrkdwn","text":"*Status:* \($status)"},
                {"type":"mrkdwn","text":"*Triggered by:* \($actor)"}
              ]},
              {"type":"context","elements":[{"type":"mrkdwn","text":"Image: `\($image)`"}]},
              {"type":"section","text":{"type":"mrkdwn","text":"<\($url)|View Workflow Run>"}}
            ]'
          )
          echo "blocks<<GHA_SLACK_BLOCKS_EOF" >> "$GITHUB_OUTPUT"
          echo "$BLOCKS" >> "$GITHUB_OUTPUT"
          echo "GHA_SLACK_BLOCKS_EOF" >> "$GITHUB_OUTPUT"
  slack-notify:
    if: always() && inputs.slack_channel_id != '' && needs.prepare-slack.outputs.message != ''
    needs: [prepare-slack]
    uses: entur/gha-slack/.github/workflows/post.yml@v3
    with:
      channel_id: ${{ inputs.slack_channel_id }}
      message: ${{ needs.prepare-slack.outputs.message }}
      blocks: ${{ needs.prepare-slack.outputs.blocks }}
    secrets: inherit
  slack-approved-react:
    if: >-
      always() &&
      inputs.slack_channel_id != '' &&
      needs.slack-pending-notify.result == 'success' &&
      needs.helm-deploy.result != 'cancelled' &&
      needs.helm-deploy.result != 'skipped'
    needs: [slack-pending-notify, helm-deploy]
    uses: entur/gha-slack/.github/workflows/react.yml@v3
    with:
      channel_id: ${{ inputs.slack_channel_id }}
      message_ts: ${{ needs.slack-pending-notify.outputs.message_ts }}
      emoji: white_check_mark
    secrets: inherit
