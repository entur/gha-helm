name: Entur/Helm/Lint
description: Helm lint
inputs:
  environment:
    description: "The target environment"
    required: true
  chart:
    description: "The chart, defaults to `helm/$repository_name`"
    default: "default"
  values:
    description: "The values file, default `$environment.yaml`. Must be in env/ subfolder from chart."
    default: "default"
runs:
  using: "composite"
  steps:
    - id: set-chart-name
      shell: bash
      if: inputs.chart == 'default'
      run: |
        echo "GHA_HELM_LINT_CHART=helm/${GITHUB_REPOSITORY#*/}" >> $GITHUB_ENV
    - id: set-values-file
      shell: bash
      if: inputs.values == 'default'
      run: |
        echo "GHA_HELM_LINT_VALUES=values-kub-ent-${{ inputs.environment }}.yaml" >> $GITHUB_ENV
    - id: set-chart-name-custom
      shell: bash
      if: inputs.chart != 'default'
      run: |
        echo "GHA_HELM_LINT_CHART=${{ inputs.chart }}" >> $GITHUB_ENV
    - id: set-values-file-custom
      shell: bash
      if: inputs.values != 'default'
      run: |
        echo "GHA_HELM_LINT_VALUES=${{ inputs.values }}" >> $GITHUB_ENV
    - id: install
      uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      with:
        version: "v3.20.1"
    - id: dependency-update
      shell: bash
      run: |
        helm dependency update "${GHA_HELM_LINT_CHART}"
    - id: lint
      shell: bash
      run: |
        helm lint \
          --quiet \
          "${GHA_HELM_LINT_CHART}" \
          -f "${GHA_HELM_LINT_CHART}/env/${GHA_HELM_LINT_VALUES}"
    - id: send-analytics
      name: Send analytics to PostHog
      uses: entur/gha-meta/.github/actions/posthog@e27fa4579248d4792b933ef0d0f240346676a25d # 1.8.0
      if: always()
      with:
        api_key:         ${{ vars.ENTUR_PLATTFORM_POSTHOG_API }}
        gha_repository:  entur/gha-helm # This must be hardcoded to the repository where the workflow is defined.
        workflow_inputs: ${{ toJSON(inputs) }}
        workflow_name:   helm-lint
