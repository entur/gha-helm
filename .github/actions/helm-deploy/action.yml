name: Entur/Helm/Deploy
description: Helm deploy
inputs:
  timeout_minutes:
    description: "Job timeout in minutes. Helm deploy timeout is half of this value to enable rollback. Default is 30 minutes."
    required: false
    default: "30"
  chart:
    description: "The chart, defaults to `helm/$repository_name`"
    default: "repo_name"
  image:
    description: "The image to deploy, on the form app:tag. Use `na` value to skip replacing the image version in the helm config."
    required: true
  release_name:
    description: "The release name, defaults to repository name"
    default: "repo_name"
  values:
    description: "The values file in `./helm/$app/env/`, default `$environment.yaml`"
    default: "values"
  namespace:
    description: "The namespace to use, defaults to repository name"
    default: "repo_name"
  image_set_path:
    description: "Comma-separated Helm values path(s) for the container image. Override when using aliased common chart dependencies (multi-app deploy), e.g. 'multi-1.container.image,multi-2.container.image'. The default is skipped when container_name is set; set explicitly to use both."
    default: "common.container.image"
  container_name:
    description: "Replace the image of a named container in the common.containers array. Resolves the array index automatically."
    required: false
    default: ""
  registry:
    description: "Container registry prefix"
    default: "eu.gcr.io/entur-system-1287"
outputs:
  HELM_DEPLOY_STATUS:
    description: "Helm Deploy Status 0: Success, 1: Failed, 2: Rollback, 3: Rollback Failed"
    value: ${{ steps.helm-deploy.outputs.HELM_DEPLOY_STATUS }}
runs:
  using: "composite"
  steps:
    - id: helm-deploy
      name: Helm deploy ./${{ env.GHA_HELM_DEPLOY_CHART }}
      env:
        TIMEOUT: ${{ inputs.timeout_minutes }}
        GHA_HELM_DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
        GHA_HELM_DEPLOY_IMAGE: ${{ inputs.image }}
        GHA_HELM_DEPLOY_RELEASE_NAME: ${{ inputs.release_name }}
        GHA_HELM_DEPLOY_CHART: ${{ inputs.chart }}
        GHA_HELM_DEPLOY_VALUES: ${{ inputs.values }}
        GHA_HELM_DEPLOY_NAMESPACE: ${{ inputs.namespace }}
        GHA_HELM_DEPLOY_IMAGE_SET_PATH: ${{ inputs.image_set_path }}
        GHA_HELM_DEPLOY_CONTAINER_NAME: ${{ inputs.container_name }}
        GHA_HELM_DEPLOY_REGISTRY: ${{ inputs.registry }}
      shell: bash
      run: |
        TIMEOUT=$((TIMEOUT/2-2)) # Helm deploy timeout is half of the total job timeout minus two minutes for possible preparation time.
        if (( TIMEOUT < 1 )); then
          echo "::error::Effective timeout is ${TIMEOUT}m — increase timeout_minutes to at least 6"
          exit 1
        fi
        helm dependency update ./${GHA_HELM_DEPLOY_CHART}
        declare -a IMAGE_REPLACE_ARG
        # --- Name-based container image replacement (modifies values.yaml via yq) ---
        if [ -n "${GHA_HELM_DEPLOY_CONTAINER_NAME}" ]; then
          if [ "${GHA_HELM_DEPLOY_IMAGE}" == "na" ] || [ -z "${GHA_HELM_DEPLOY_IMAGE}" ]; then
            echo "::error::container_name requires a valid 'image' input, but got '${GHA_HELM_DEPLOY_IMAGE}'."
            exit 1
          fi
          VALUES_FILE="./${GHA_HELM_DEPLOY_CHART}/values.yaml"
          if [ ! -f "${VALUES_FILE}" ]; then
            echo "::error::Chart values file not found: ${VALUES_FILE}"
            exit 1
          fi
          if ! command -v yq &> /dev/null; then
            echo "::error::yq is required for container_name but was not found on this runner"
            exit 1
          fi
          if [[ ! "${GHA_HELM_DEPLOY_CONTAINER_NAME}" =~ ^[a-z0-9]([a-z0-9-]*[a-z0-9])?$ ]]; then
            echo "::error::Invalid container_name: '${GHA_HELM_DEPLOY_CONTAINER_NAME}'. Must be a lowercase DNS label (a-z, 0-9, hyphens)."
            exit 1
          fi

          CONTAINERS_PATH="common.containers"
          INDEX=$(yq eval ".${CONTAINERS_PATH} | to_entries | .[] | select(.value.name == \"${GHA_HELM_DEPLOY_CONTAINER_NAME}\") | .key" "${VALUES_FILE}")

          if [ -z "${INDEX}" ]; then
            echo "::error::Container '${GHA_HELM_DEPLOY_CONTAINER_NAME}' not found in '${CONTAINERS_PATH}' in ${VALUES_FILE}"
            exit 1
          fi

          FULL_IMAGE="${GHA_HELM_DEPLOY_REGISTRY}/${GHA_HELM_DEPLOY_IMAGE}"
          echo "Setting container '${GHA_HELM_DEPLOY_CONTAINER_NAME}' (index ${INDEX}) image to: ${FULL_IMAGE}"
          yq eval ".${CONTAINERS_PATH}[${INDEX}].image = \"${FULL_IMAGE}\"" -i "${VALUES_FILE}"
        fi
        # --- Path-based image replacement via --set (skipped when using default with container_name) ---
        if [ "${GHA_HELM_DEPLOY_IMAGE}" != "na" ]; then
          if [ -z "${GHA_HELM_DEPLOY_CONTAINER_NAME}" ] || [ "${GHA_HELM_DEPLOY_IMAGE_SET_PATH}" != "common.container.image" ]; then
            echo "Setting new image: ${GHA_HELM_DEPLOY_IMAGE}"
            IFS=',' read -ra PATHS <<< "${GHA_HELM_DEPLOY_IMAGE_SET_PATH}"
            for path in "${PATHS[@]}"; do
              path=$(echo "${path}" | xargs) # trim whitespace
              if [[ ! "${path}" =~ ^[a-zA-Z0-9._-]+$ ]]; then
                echo "::error::Invalid image_set_path value: ${path}"
                exit 1
              fi
              IMAGE_REPLACE_ARG+=("--set" "${path}=${GHA_HELM_DEPLOY_REGISTRY}/${GHA_HELM_DEPLOY_IMAGE}")
            done
          fi
        fi
        # Deploy the Helm chart
        if helm upgrade "${GHA_HELM_DEPLOY_RELEASE_NAME}" "./${GHA_HELM_DEPLOY_CHART}" \
          -f "${GHA_HELM_DEPLOY_CHART}/env/${GHA_HELM_DEPLOY_VALUES}" \
          --namespace "${GHA_HELM_DEPLOY_NAMESPACE}" \
          --install \
          --wait \
          --timeout "${TIMEOUT}m0s" \
          --debug \
          ${IMAGE_REPLACE_ARG[@]}
        then
          echo "#################################################################################################"
          echo " Helm deployment successful."
          echo "#################################################################################################"
          echo "HELM_DEPLOY_STATUS=0" >> "$GITHUB_OUTPUT"
        else
          # check if we have previous Helm release
          if helm list --all -n "${GHA_HELM_DEPLOY_NAMESPACE}" --filter "^${GHA_HELM_DEPLOY_RELEASE_NAME}$" --short | grep -q .
          then
            echo "#################################################################################################"
            echo "Helm deployment failed. Rolling back to the previous version:"
            echo "#################################################################################################"
            if helm rollback "${GHA_HELM_DEPLOY_RELEASE_NAME}" --namespace "${GHA_HELM_DEPLOY_NAMESPACE}" --wait --timeout "${TIMEOUT}m0s" --debug
            then
              echo "#################################################################################################"
              echo " Helm rollback completed... please investigate."
              echo "#################################################################################################"
              echo "HELM_DEPLOY_STATUS=2" >> "$GITHUB_OUTPUT"
              exit 2
            else
              echo "#################################################################################################"
              echo " Helm Rollback failed ... please investigate manually."
              echo "#################################################################################################"
              echo "HELM_DEPLOY_STATUS=3" >> "$GITHUB_OUTPUT"
              exit 3
            fi
          else
            echo "#################################################################################################"
            echo "  Helm upgrade/install failed, but no previous Helm release found. Please investigate."
            echo "#################################################################################################"
            echo "HELM_DEPLOY_STATUS=1" >> "$GITHUB_OUTPUT"
            exit 1
          fi
        fi
